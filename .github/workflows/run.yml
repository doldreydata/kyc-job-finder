name: KYC Job Finder — Daily Run

on:
  schedule:
    # Every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode CV PDF from secret
        run: echo "${{ secrets.CV_PDF_BASE64 }}" | base64 -d > cv.pdf

      - name: Run KYC Job Finder
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SEARCH_QUERIES: ${{ secrets.SEARCH_QUERIES }}
          LOCATION: ${{ secrets.LOCATION }}
          MIN_SCORE: ${{ secrets.MIN_SCORE }}
          MAX_JOBS_PER_RUN: ${{ secrets.MAX_JOBS_PER_RUN }}
        run: python main.py

      - name: Commit updated seen.db back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.db
          git diff --staged --quiet || git commit -m "chore: update seen.db [skip ci]"
          git push